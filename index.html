<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16241a">
<title>Pup Dash 🐾 — Luna vs Dolly</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>">
<style>
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #131f12;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }
  body {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

/* ============================================================
   PUP DASH — Luna (beagle) vs Dolly (weimaraner).
   Mobile-only portrait racer built on the Dachshund Dash engine
   with per-breed body shapes. Logical width fixed at 540;
   logical height stretches between safe-area insets.
   ============================================================ */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 540;
let H = 960;
let SCALE = 1, cssW = 0, cssH = 0, lastDpr = 0;
let safeTop = 0, safeBottom = 0;

function readInset(name) {
  const v = parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name));
  return isFinite(v) ? Math.max(0, v) : 0;
}

function resize() {
  const dpr = Math.min(2.5, window.devicePixelRatio || 1);
  const vw = Math.max(1, window.innerWidth);
  const vh = Math.max(1, (window.visualViewport && window.visualViewport.height) || window.innerHeight);
  let s = vw / W;
  let lh = vh / s;
  if (lh < 820) {           // too wide (landscape / desktop window): pillarbox
    lh = 820;
    s = vh / lh;
  } else if (lh > 1180) {   // extremely tall: letterbox a little
    lh = 1180;
  }
  H = Math.round(lh);
  cssW = Math.max(1, Math.floor(W * s));
  cssH = Math.max(1, Math.floor(H * s));
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = Math.max(1, Math.round(cssW * dpr));
  canvas.height = Math.max(1, Math.round(cssH * dpr));
  SCALE = canvas.width / W;
  lastDpr = dpr;
  // safe areas only matter when the canvas truly fills the viewport
  const full = cssH >= vh - 4 && cssW >= vw - 4;
  safeTop = full ? Math.min(80, readInset('--sat') / s) : 0;
  safeBottom = full ? Math.min(80, readInset('--sab') / s) : 0;
}
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));
resize();

/* ===================== utilities ===================== */

const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (a, b) => a + Math.random() * (b - a);
function smoothstep(a, b, x) {
  const t = clamp((x - a) / (b - a), 0, 1);
  return t * t * (3 - 2 * t);
}
function hash(n) {
  const s = Math.sin(n * 127.1 + 311.7) * 43758.5453;
  return s - Math.floor(s);
}
function rr(x, y, w, h, r) {
  r = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
const FONT = "'Arial Rounded MT Bold','Trebuchet MS','Segoe UI',system-ui,sans-serif";
function tx(s, x, y, size, o) {
  o = o || {};
  ctx.font = (o.w || 'bold') + ' ' + size + 'px ' + FONT;
  ctx.textAlign = o.align || 'center';
  ctx.textBaseline = o.base || 'middle';
  if (o.stroke) {
    ctx.lineWidth = o.sw || Math.max(2, size / 8);
    ctx.strokeStyle = o.stroke;
    ctx.lineJoin = 'round';
    ctx.strokeText(s, x, y);
  }
  ctx.fillStyle = o.c || '#fff';
  ctx.fillText(s, x, y);
}
const fmtT = t => t == null ? '—' : t.toFixed(2) + 's';
const cap = s => s.charAt(0) + s.slice(1).toLowerCase();

/* ===================== config ===================== */

const CFG = {
  dt: 1 / 120,
  ppm: 20,                 // pixels per meter (narrower view than desktop)
  trackLen: 250,
  impulse: 5.2,            // punchier per-tap kick; impulse/drag ratio matches desktop so top speeds are unchanged
  drag: 2.42,
  vmax: 13.5,
  tapCost: 1.1,
  regen: 5.5,
  samePenalty: 0.38,
  zoomDur: 2.6,
  zoomBoost: 1.45,
  zoomPerTap: 3.2,
  treatStamina: 15,
  treatZoom: 16,
  noseOff: 2.3
};

const DIFFS = {
  easy:   { label: 'EASY',   rate: 3.2, rubber: 1.5, lo: 18, hi: 42, zoomDelay: 1.2,  smart: false },
  normal: { label: 'NORMAL', rate: 4.9, rubber: 1.0, lo: 26, hi: 55, zoomDelay: 0.55, smart: false },
  hard:   { label: 'HARD',   rate: 5.9, rubber: 0.6, lo: 30, hi: 60, zoomDelay: 0.25, smart: true }
};
const DIFF_ORDER = ['easy', 'normal', 'hard'];

/* world geometry (portrait band) */
const HORIZON = 340;
const TRACK_TOP = 392, TRACK_DIV = 517, TRACK_BOT = 642;
const LANES = {
  cpu:    { ground: 502, scale: 0.92 },
  player: { ground: 627, scale: 1.0 }
};

const ROSTER = [
  { id: 'luna', name: 'LUNA',   // beagle: tricolor — white base, brown head, black saddle, white-tipped tail
    colors: {
      main: '#f2ecdf', head: '#a96f3d', dark: '#d9d0bd', leg: '#f2ecdf', legDark: '#ddd4c1',
      ear: '#7e5023', belly: '#fbf8f1', paw: '#e3dac8', collar: '#d8333b',
      snout: '#f2ecdf', nose: '#1d1713', brow: null,
      tail: '#3a2f24', tailTip: '#f6f1e6',
      patches: [ { dx: -10, dy: -9, rx: 25, ry: 14, rot: 0.15 }, { dx: 16, dy: -12, rx: 13, ry: 9, rot: -0.3 } ],
      patchColor: '#322a22',
      shape: { bodyLen: 72, bodyR: 19, legLen: 31, legW: 9.5, headR: 16, headUp: 18, snoutL: 24, snoutH: 13, earW: 9, earH: 23, tailL: 25, tailW: 6.5 }
    } },
  { id: 'dolly', name: 'DOLLY',  // weimaraner: sleek silver-gray all over, amber eyes, liver nose
    colors: {
      main: '#9aa2a7', head: '#9aa2a7', dark: '#7c848b', leg: '#9aa2a7', legDark: '#838b92',
      ear: '#868e94', belly: '#b2bac0', paw: '#8b9398', collar: '#8a5fd8',
      snout: '#9aa2a7', nose: '#6f6259', brow: null, eyeWhite: '#e9c97e',
      tail: '#7c848b',
      shape: { bodyLen: 80, bodyR: 17, legLen: 38, legW: 8, headR: 15, headUp: 24, snoutL: 29, snoutH: 12, earW: 8, earH: 20, tailL: 29, tailW: 5.5 }
    } }
];

/* ===================== persistence ===================== */

const SAVE_KEY = 'pup-dash-v1';
function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && typeof d === 'object') return d;
  } catch (e) { /* private mode quirks */ }
  return {};
}
function saveData() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      best: G.best, muted: G.muted, diff: G.diff, char: ROSTER[G.charSel].id
    }));
  } catch (e) { /* ignore */ }
}

/* ===================== game state ===================== */

function makeDog(id, name, colors, lane) {
  return {
    id, name, colors, lane,
    x: 2, prevX: 2, v: 0,
    stamina: 100, zoom: 0, zoomT: 0,
    phase: rand(0, 6), hopT: 0, lastSide: null,
    finished: false, finishTime: null, finishV: 0, finishPhase: 0,
    blinkSeed: rand(0, 10)
  };
}
function resetDog(d) {
  d.x = 2; d.prevX = 2; d.v = 0;
  d.stamina = 100; d.zoom = 0; d.zoomT = 0;
  d.hopT = 0; d.lastSide = null;
  d.finished = false; d.finishTime = null; d.finishV = 0; d.finishPhase = 0;
}

const G = {
  state: 'title',
  pausedFrom: 'racing',
  diff: 'normal',
  charSel: 0,
  muted: false,
  animT: 0,
  raceT: 0, countT: 0, cdLast: 4, goFlash: 0,
  camX: -110,
  player: makeDog('player', 'LUNA', ROSTER[0].colors, LANES.player),
  cpu: makeDog('cpu', 'DOLLY', ROSTER[1].colors, LANES.cpu),
  treats: [],
  particles: [],
  confetti: [],
  order: [], winner: null, firstAt: 0,
  resultsT: 0, margin: null, photo: false, newRecord: false,
  best: { easy: null, normal: null, hard: null },
  ui: [], pointer: null,
  pawFlash: { side: null, t: 0 },
  stepN: 0
};

(function applySaved() {
  const d = loadData();
  if (d.best && typeof d.best === 'object') {
    for (const k of DIFF_ORDER) {
      const v = d.best[k];
      if (typeof v === 'number' && isFinite(v) && v > 0) G.best[k] = v;
    }
  }
  if (DIFF_ORDER.includes(d.diff)) G.diff = d.diff;
  if (typeof d.char === 'string') {
    const ci = ROSTER.findIndex(r => r.id === d.char);
    if (ci >= 0) G.charSel = ci;
  }
  G.muted = !!d.muted;
})();

function applyPlayerChar() {
  const ch = ROSTER[G.charSel];
  const rival = ROSTER[G.charSel === 0 ? 1 : 0];
  G.player.name = ch.name;
  G.player.colors = ch.colors;
  G.cpu.name = rival.name;
  G.cpu.colors = rival.colors;
}
applyPlayerChar();
// idle stand-ins drawn inside the picker cards by the real dog renderer
const PREVIEW = ROSTER.map(r => makeDog('preview-' + r.id, r.name, r.colors, LANES.player));

/* ===================== audio ===================== */

const Snd = {
  ctx: null, master: null, sfxG: null, musicG: null,
  noiseBuf: null, gestureDone: false, lastStep: 0,
  music: { on: false, step: 0, nextT: 0, iv: null },

  ok() { return !!this.ctx && this.ctx.state === 'running'; },

  ensure() {
    if (!this.ctx) {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = G.muted ? 0 : 0.6;
        this.master.connect(this.ctx.destination);
        this.sfxG = this.ctx.createGain();
        this.sfxG.gain.value = 1;
        this.sfxG.connect(this.master);
        this.musicG = this.ctx.createGain();
        this.musicG.gain.value = 0;
        this.musicG.connect(this.master);
        const len = Math.floor(this.ctx.sampleRate * 1);
        this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const ch = this.noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
      } catch (e) { this.ctx = null; }
    }
    // iOS can sit in 'suspended' or the non-standard 'interrupted' state;
    // resume() resolves async, so re-kick the music when it lands
    if (this.ctx && this.ctx.state !== 'running') {
      this.ctx.resume().then(() => updateMusic()).catch(() => {});
    }
  },

  setMuted(m) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setTargetAtTime(m ? 0 : 0.6, t, 0.03);
  },

  tone(freq, dur, type, vol, when, glideTo, dest) {
    if (!this.ok()) return;
    const t0 = this.ctx.currentTime + (when || 0);
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g);
    g.connect(dest || this.sfxG);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  },

  noise(dur, vol, when, filterFreq, filterType, q, dest) {
    if (!this.ok()) return;
    const t0 = this.ctx.currentTime + (when || 0);
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf;
    src.loop = true;
    src.playbackRate.value = rand(0.85, 1.15);
    const f = this.ctx.createBiquadFilter();
    f.type = filterType || 'lowpass';
    f.frequency.value = filterFreq || 1000;
    f.Q.value = q || 0.8;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + Math.min(0.02, dur * 0.3));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(f); f.connect(g); g.connect(dest || this.sfxG);
    src.start(t0);
    src.stop(t0 + dur + 0.05);
  },

  swell(dur, vol, filterFreq) {
    if (!this.ok()) return;
    const t0 = this.ctx.currentTime;
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf;
    src.loop = true;
    const f = this.ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = filterFreq; f.Q.value = 0.6;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + dur * 0.35);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(f); f.connect(g); g.connect(this.sfxG);
    src.start(t0);
    src.stop(t0 + dur + 0.1);
  },

  step() {
    if (!this.ok()) return;
    const now = this.ctx.currentTime;
    if (now - this.lastStep < 0.045) return;
    this.lastStep = now;
    this.noise(0.045, 0.07, 0, 700, 'lowpass');
  },
  beep(f, dur, vol) { this.tone(f, dur, 'square', vol); },
  bark(vol) {
    this.tone(620, 0.07, 'square', 0.26 * vol, 0, 330);
    this.tone(560, 0.09, 'square', 0.22 * vol, 0.11, 300);
  },
  treat(vol) {
    this.tone(1046, 0.07, 'sine', 0.16 * vol);
    this.tone(1568, 0.1, 'sine', 0.14 * vol, 0.06);
  },
  cheer() {
    this.swell(1.8, 0.2, 950);
    this.tone(700, 0.06, 'square', 0.1, 0.3, 380);
    this.tone(660, 0.06, 'square', 0.09, 0.62, 360);
  },
  fanfare() {
    this.tone(659, 0.13, 'triangle', 0.2, 0.0);
    this.tone(784, 0.13, 'triangle', 0.2, 0.13);
    this.tone(1047, 0.2, 'triangle', 0.22, 0.26);
    this.tone(1319, 0.5, 'triangle', 0.22, 0.46);
    this.tone(523, 0.5, 'triangle', 0.1, 0.46);
    this.tone(784, 0.5, 'triangle', 0.1, 0.46);
  },
  sad() {
    this.tone(392, 0.25, 'triangle', 0.16, 0);
    this.tone(330, 0.25, 'triangle', 0.15, 0.26);
    this.tone(262, 0.5, 'triangle', 0.15, 0.52);
  },

  BASS: [48, 43, 45, 43, 41, 43, 48, 43],
  LEAD: [72, 0, 76, 0, 79, 81, 0, 79, 76, 0, 72, 0, 74, 76, 0, 0],
  noteF(m) { return 440 * Math.pow(2, (m - 69) / 12); },

  musicStart() {
    if (!this.ok() || this.music.on) return;
    this.music.on = true;
    this.music.step = 0;
    this.music.nextT = this.ctx.currentTime + 0.08;
    const t = this.ctx.currentTime;
    this.musicG.gain.cancelScheduledValues(t);
    this.musicG.gain.setTargetAtTime(0.42, t, 0.15);
    this.music.iv = setInterval(() => this.musicTick(), 30);
  },
  musicStop() {
    if (!this.music.on) return;
    this.music.on = false;
    if (this.music.iv) { clearInterval(this.music.iv); this.music.iv = null; }
    if (this.ctx) {
      const t = this.ctx.currentTime;
      this.musicG.gain.cancelScheduledValues(t);
      this.musicG.gain.setTargetAtTime(0, t, 0.08);
    }
  },
  musicTick() {
    if (!this.ok()) return;
    const stepDur = 60 / 132 / 2;
    if (this.music.nextT < this.ctx.currentTime - 0.3) {
      this.music.nextT = this.ctx.currentTime + 0.05;
    }
    const ahead = this.ctx.currentTime + 0.16;
    let guard = 0;
    while (this.music.nextT < ahead && guard++ < 32) {
      this.schedStep(this.music.step, this.music.nextT - this.ctx.currentTime, stepDur);
      this.music.step = (this.music.step + 1) % 16;
      this.music.nextT += stepDur;
    }
  },
  schedStep(s, when, stepDur) {
    if (when < 0) when = 0;
    if (s % 2 === 0) {
      this.tone(this.noteF(this.BASS[s / 2]), stepDur * 1.7, 'triangle', 0.2, when, null, this.musicG);
    }
    const L = this.LEAD[s];
    if (L) this.tone(this.noteF(L), stepDur * 0.75, 'square', 0.055, when, null, this.musicG);
    if (G.state === 'racing') {
      this.noise(0.025, s % 2 ? 0.045 : 0.022, when, 6000, 'highpass', 0.7, this.musicG);
    }
  }
};

function updateMusic() {
  const want = Snd.gestureDone && !G.muted && !document.hidden &&
    (G.state === 'title' || G.state === 'countdown' || G.state === 'racing');
  if (want) { Snd.ensure(); Snd.musicStart(); }
  else Snd.musicStop();
}
function firstGesture() {
  Snd.ensure();
  if (!Snd.gestureDone && Snd.ctx) {
    Snd.gestureDone = true;
    updateMusic();
  }
}
function toggleMute() {
  G.muted = !G.muted;
  Snd.setMuted(G.muted);
  updateMusic();
  saveData();
}

/* ===================== particles ===================== */

function spawnDust(d) {
  if (G.particles.length > 200) return;
  const lane = d.lane;
  for (let i = 0; i < 3; i++) {
    G.particles.push({
      x: d.x * CFG.ppm - 30 * lane.scale + rand(-8, 8),
      y: lane.ground - 2 + rand(-2, 2),
      vx: -rand(25, 70), vy: -rand(15, 45), g: 150,
      t: 0, life: rand(0.35, 0.6), r: rand(2.5, 5), c: '214,186,142'
    });
  }
}
function sparkle(m, lane) {
  for (let i = 0; i < 8; i++) {
    G.particles.push({
      x: m * CFG.ppm + rand(-6, 6), y: lane.ground - 14 + rand(-6, 6),
      vx: rand(-60, 60), vy: -rand(40, 100), g: 50,
      t: 0, life: rand(0.4, 0.7), r: rand(2, 3.5), c: '255,216,84'
    });
  }
}
function burstZoom(d) {
  for (let i = 0; i < 14; i++) {
    G.particles.push({
      x: d.x * CFG.ppm + rand(-30, 10), y: d.lane.ground - rand(8, 50),
      vx: -rand(60, 160), vy: rand(-50, 50), g: 0,
      t: 0, life: rand(0.3, 0.55), r: rand(2.5, 4.5), c: '255,152,60'
    });
  }
}
function updateParticles(fdt) {
  const ps = G.particles;
  for (let i = ps.length - 1; i >= 0; i--) {
    const p = ps[i];
    p.t += fdt;
    if (p.t >= p.life) { ps.splice(i, 1); continue; }
    p.x += p.vx * fdt;
    p.y += p.vy * fdt;
    p.vy += p.g * fdt;
  }
}
function drawParticles() {
  for (const p of G.particles) {
    const a = 1 - p.t / p.life;
    ctx.fillStyle = 'rgba(' + p.c + ',' + (a * 0.8).toFixed(3) + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (1 - 0.4 * p.t / p.life), 0, 7);
    ctx.fill();
  }
}
function updateConfetti(fdt) {
  if (G.state === 'finished' && G.winner === 'player' && G.confetti.length < 130) {
    for (let i = 0; i < 2; i++) {
      G.confetti.push({
        x: rand(0, W), y: rand(-30, -5),
        vy: rand(70, 150), sway: rand(20, 60), ph: rand(0, 6),
        rot: rand(0, 6), vr: rand(-4, 4),
        w: rand(5, 8), h: rand(7, 11),
        c: ['#e54f47', '#ffd34e', '#3fc1a0', '#ef7cb5', '#6fd34f', '#5b8def'][Math.floor(rand(0, 6))]
      });
    }
  }
  for (let i = G.confetti.length - 1; i >= 0; i--) {
    const c = G.confetti[i];
    c.y += c.vy * fdt;
    c.ph += fdt * 3;
    c.x += Math.sin(c.ph) * c.sway * fdt;
    c.rot += c.vr * fdt;
    if (c.y > H + 20) G.confetti.splice(i, 1);
  }
}
function drawConfetti() {
  for (const c of G.confetti) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.c;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
}

/* ===================== dog physics ===================== */

function dogUpdate(d, dt) {
  d.prevX = d.x;
  if (d.zoomT > 0) d.zoomT = Math.max(0, d.zoomT - dt);
  d.v = Math.max(0, d.v * (1 - CFG.drag * dt));
  d.x += d.v * dt;
  const regen = CFG.regen * (d.v < 3 ? 1.6 : 1);
  d.stamina = clamp(d.stamina + regen * dt, 0, 100);
  d.phase += dt * (1.4 + d.v * 0.55) * Math.PI;
  if (d.hopT > 0) d.hopT = Math.max(0, d.hopT - dt);
}

function dogStride(d, side) {
  if (G.state !== 'racing' || d.finished) return;
  const eff = side === d.lastSide ? CFG.samePenalty : 1;
  d.lastSide = side;
  const sf = 0.45 + 0.55 * smoothstep(5, 35, d.stamina);
  const boost = d.zoomT > 0 ? CFG.zoomBoost : 1;
  d.v = Math.min(d.v + CFG.impulse * eff * sf * boost, CFG.vmax * boost * (0.7 + 0.3 * sf));
  d.stamina = clamp(d.stamina - CFG.tapCost * (0.5 + 0.5 * eff), 0, 100);
  if (eff === 1 && d.zoomT <= 0) d.zoom = Math.min(100, d.zoom + CFG.zoomPerTap);
  d.hopT = 0.12;
  if (d.v > 2.5) spawnDust(d);
  if (d.id === 'player') Snd.step();
}

/* on touch, every tap is a full-power stride — the gait alternates
   automatically, so drumming the pad with any thumb never gets the
   same-side penalty (that stays a keyboard/desktop mechanic) */
function playerTap() {
  G.pawFlash.t = 0.1;
  const p = G.player;
  if (G.state === 'racing') {
    dogStride(p, p.lastSide === 'L' ? 'R' : 'L');
  } else if (G.state === 'countdown') {
    p.lastSide = p.lastSide === 'L' ? 'R' : 'L';
    p.hopT = 0.1;
    Snd.step();
  }
}

function dogZoomies(d) {
  if (G.state !== 'racing' || d.finished || d.zoom < 100 || d.zoomT > 0) return false;
  d.zoomT = CFG.zoomDur;
  d.zoom = 0;
  Snd.bark(d.id === 'player' ? 1 : 0.6);
  burstZoom(d);
  return true;
}

/* ===================== CPU controller ===================== */

const AI = { acc: 0, side: 'L', rec: false, zoomHold: 0, seed: 0 };
function aiReset() {
  AI.acc = rand(0, 0.5);
  AI.side = 'L';
  AI.rec = false;
  AI.zoomHold = 0;
  AI.seed = rand(0, 10);
}

function aiUpdate(dt) {
  const d = G.cpu, p = G.player, cfg = DIFFS[G.diff];
  if (d.finished) return;
  if (AI.rec && d.stamina > cfg.hi) AI.rec = false;
  if (!AI.rec && d.stamina < cfg.lo) AI.rec = true;
  let rate = cfg.rate * (AI.rec ? 0.5 : 1);
  if (!p.finished) {
    const gap = d.x - p.x;
    rate *= 1 - clamp(gap / 20, -1, 1) * 0.28 * cfg.rubber;
  }
  rate *= 1 + 0.06 * Math.sin(G.raceT * 1.7 + AI.seed) + 0.04 * Math.sin(G.raceT * 4.3 + AI.seed * 2.7);
  if (d.zoomT > 0) rate = Math.max(rate, cfg.rate * 1.05);
  AI.acc += rate * dt;
  let guard = 0;
  while (AI.acc >= 1 && guard++ < 8) {
    AI.acc -= 1;
    dogStride(d, AI.side);
    AI.side = AI.side === 'L' ? 'R' : 'L';
  }
  if (d.zoom >= 100 && d.zoomT <= 0) {
    AI.zoomHold += dt;
    const want = cfg.smart ? (d.x > CFG.trackLen * 0.62 || d.x - p.x < -6) : true;
    if (want && AI.zoomHold >= cfg.zoomDelay) dogZoomies(d);
  } else {
    AI.zoomHold = 0;
  }
}

/* ===================== treats ===================== */

function genTreats() {
  const arr = [];
  let m = 26;
  for (;;) {
    m += rand(26, 52);
    if (m > CFG.trackLen - 20) break;
    arr.push({ m, taken: { player: false, cpu: false }, bob: rand(0, 6) });
  }
  return arr;
}
function checkTreats(d) {
  for (const t of G.treats) {
    if (!t.taken[d.id] && Math.abs(d.x + CFG.noseOff - t.m) < 1.15) {
      t.taken[d.id] = true;
      d.stamina = clamp(d.stamina + CFG.treatStamina, 0, 100);
      if (d.zoomT <= 0) d.zoom = Math.min(100, d.zoom + CFG.treatZoom);
      sparkle(t.m, d.lane);
      Snd.treat(d.id === 'player' ? 1 : 0.35);
    }
  }
}

/* ===================== race flow ===================== */

function camTargetX() {
  const px = G.player.x * CFG.ppm;
  return clamp(px - 160, -110, CFG.trackLen * CFG.ppm + 200 - W);
}

function startRace() {
  applyPlayerChar();   // CPU always runs the other pup
  resetDog(G.player);
  resetDog(G.cpu);
  aiReset();
  G.treats = genTreats();
  G.particles.length = 0;
  G.confetti.length = 0;
  G.order = [];
  G.winner = null;
  G.firstAt = 0;
  G.raceT = 0;
  G.goFlash = 0;
  G.resultsT = 0;
  G.margin = null;
  G.photo = false;
  G.newRecord = false;
  G.countT = 3.0;
  G.cdLast = 4;
  G.camX = camTargetX();
  G.state = 'countdown';
  updateMusic();
}

function toTitle() {
  G.state = 'title';
  G.camX = -110;
  resetDog(G.player);
  resetDog(G.cpu);
  G.particles.length = 0;
  G.confetti.length = 0;
  G.winner = null;
  G.order = [];
  G.treats = [];
  updateMusic();
}

function setPause(on) {
  if (on && (G.state === 'racing' || G.state === 'countdown')) {
    G.pausedFrom = G.state;
    G.state = 'paused';
    updateMusic();
  } else if (!on && G.state === 'paused') {
    G.state = G.pausedFrom;
    updateMusic();
  }
}

function checkFinish(d) {
  if (d.finished || d.x < CFG.trackLen) return;
  const span = d.x - d.prevX;
  const f = span > 0 ? (CFG.trackLen - d.prevX) / span : 1;
  d.finishTime = G.raceT - CFG.dt + CFG.dt * clamp(f, 0, 1);
  d.finishV = d.v;
  d.finishPhase = d.phase;
  d.finished = true;
  G.order.push(d.id);
  if (G.order.length === 1) {
    G.winner = d.id;
    G.firstAt = G.raceT;
    Snd.cheer();
  }
}

function enterFinished() {
  G.state = 'finished';
  G.resultsT = 0;
  const p = G.player, c = G.cpu;
  // a same-step double finish must rank by interpolated time, not by check order
  if (p.finished && c.finished) G.winner = p.finishTime <= c.finishTime ? 'player' : 'cpu';
  G.margin = (p.finished && c.finished) ? Math.abs(p.finishTime - c.finishTime) : null;
  G.photo = G.margin != null && G.margin < 0.18;
  if (p.finished) {
    const b = G.best[G.diff];
    if (b == null || p.finishTime < b) {
      G.best[G.diff] = p.finishTime;
      G.newRecord = true;
    }
  }
  saveData();
  if (G.winner === 'player') Snd.fanfare(); else Snd.sad();
  updateMusic();
}

/* ===================== fixed-step update ===================== */

function update(dt) {
  if (G.state === 'countdown') {
    G.countT -= dt;
    const c = Math.ceil(G.countT);
    if (c !== G.cdLast) {
      G.cdLast = c;
      if (c > 0) Snd.beep(440, 0.12, 0.3);
    }
    if (G.countT <= 0) {
      G.state = 'racing';
      G.raceT = 0;
      G.goFlash = 0.9;
      Snd.beep(880, 0.3, 0.32);
      Snd.bark(0.7);
      updateMusic();
    }
    return;
  }

  if (G.state === 'racing') {
    G.raceT += dt;
    aiUpdate(dt);
    dogUpdate(G.player, dt);
    dogUpdate(G.cpu, dt);
    checkTreats(G.player);
    checkTreats(G.cpu);
    checkFinish(G.player);
    checkFinish(G.cpu);
    if (G.winner && (G.order.length === 2 || G.raceT - G.firstAt > 7)) {
      enterFinished();
    }
    return;
  }

  if (G.state === 'finished') {
    dogUpdate(G.player, dt);
    dogUpdate(G.cpu, dt);
  }
}

/* ===================== drawing: world ===================== */

const clouds = [];
for (let i = 0; i < 8; i++) {
  clouds.push({ x: rand(0, 2200), y: rand(36, 230), s: rand(0.55, 1.3) });
}

const crowd = [];
(function genCrowd() {
  const palette = ['#e05a4e', '#4e8fe0', '#56b86a', '#e0b14e', '#9b6fd4', '#e07fb0', '#50bfc4'];
  const skins = ['#f5cfa4', '#e2b184', '#c98e5e', '#8c5a36', '#6b4326'];
  const finish = CFG.trackLen;
  for (let m = finish - 55; m < finish + 13; m += 2.4) {
    const j = hash(m * 13.7);
    crowd.push({
      x: m * CFG.ppm + (j - 0.5) * 20,
      ph: hash(m * 7.3) * 6,
      c: palette[Math.floor(hash(m * 3.1) * palette.length) % palette.length],
      skin: skins[Math.floor(hash(m * 5.9) * skins.length) % skins.length]
    });
  }
  for (let m = 18; m < finish - 62; m += 34 + hash(m) * 18) {
    crowd.push({
      x: m * CFG.ppm,
      ph: hash(m * 2.2) * 6,
      c: palette[Math.floor(hash(m * 9.4) * palette.length) % palette.length],
      skin: skins[Math.floor(hash(m * 4.4) * skins.length) % skins.length]
    });
  }
})();

let skyGrad = null;
function drawSky() {
  if (!skyGrad) {
    skyGrad = ctx.createLinearGradient(0, 0, 0, HORIZON + 5);
    skyGrad.addColorStop(0, '#79bfe8');
    skyGrad.addColorStop(0.75, '#bfe3f4');
    skyGrad.addColorStop(1, '#e4f3e9');
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, HORIZON + 5);
  ctx.fillStyle = 'rgba(255,238,170,0.35)';
  ctx.beginPath(); ctx.arc(448, 150, 52, 0, 7); ctx.fill();
  ctx.fillStyle = '#ffe9a0';
  ctx.beginPath(); ctx.arc(448, 150, 30, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  for (const c of clouds) {
    let wx = ((c.x - G.camX * 0.12) % 2200 + 2200) % 2200 - 250;
    if (wx < -160 || wx > W + 160) continue;
    ctx.beginPath();
    ctx.arc(wx, c.y, 18 * c.s, 0, 7);
    ctx.arc(wx + 20 * c.s, c.y - 9 * c.s, 14 * c.s, 0, 7);
    ctx.arc(wx + 40 * c.s, c.y, 16 * c.s, 0, 7);
    ctx.arc(wx + 19 * c.s, c.y + 6 * c.s, 15 * c.s, 0, 7);
    ctx.fill();
  }
}

function drawForest() {
  ctx.fillStyle = '#4a7a42';
  const sp = 64, par = 0.22;
  const i0 = Math.floor((G.camX * par - 90) / sp);
  for (let i = i0; i < i0 + Math.ceil(W / sp) + 3; i++) {
    const wx = i * sp - G.camX * par;
    const r = 30 + hash(i * 1.71) * 24;
    const y = 300 - hash(i * 3.13) * 15;
    ctx.beginPath(); ctx.arc(wx, y, r, 0, 7); ctx.fill();
  }
  ctx.fillRect(0, 308, W, HORIZON - 308);

  const sp2 = 220, par2 = 0.5;
  const j0 = Math.floor((G.camX * par2 - 150) / sp2);
  for (let j = j0; j < j0 + Math.ceil(W / sp2) + 3; j++) {
    const wx = j * sp2 + hash(j * 8.8) * 80 - G.camX * par2;
    const s = 0.7 + hash(j * 2.6) * 0.5;
    const baseY = 350;
    ctx.fillStyle = '#7a5a38';
    rr(wx - 5 * s, baseY - 46 * s, 10 * s, 48 * s, 4 * s); ctx.fill();
    ctx.fillStyle = hash(j * 4.4) > 0.5 ? '#5d9a4c' : '#549147';
    ctx.beginPath();
    ctx.arc(wx, baseY - 62 * s, 26 * s, 0, 7);
    ctx.arc(wx - 18 * s, baseY - 46 * s, 19 * s, 0, 7);
    ctx.arc(wx + 18 * s, baseY - 47 * s, 20 * s, 0, 7);
    ctx.fill();
  }
}

function drawGrassAndTrack() {
  // grass band with fence sits between horizon and track
  ctx.fillStyle = '#6db257';
  ctx.fillRect(0, HORIZON, W, TRACK_TOP - HORIZON);
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, HORIZON, W, 5);
  // track lanes
  ctx.fillStyle = '#cf9059';
  ctx.fillRect(0, TRACK_TOP, W, TRACK_DIV - TRACK_TOP);
  ctx.fillStyle = '#d99a61';
  ctx.fillRect(0, TRACK_DIV, W, TRACK_BOT - TRACK_DIV);
  // ground below the track stretches to the controls
  ctx.fillStyle = '#4e7f41';
  ctx.fillRect(0, TRACK_BOT, W, H - TRACK_BOT);
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, TRACK_BOT, W, 6);
  // lane lines
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillRect(0, TRACK_TOP, W, 3);
  ctx.fillRect(0, TRACK_DIV - 2, W, 3);
  ctx.fillRect(0, TRACK_BOT - 3, W, 3);
}

function drawBalloons(x, y) {
  const cols = ['#e54f47', '#ffd34e', '#5b8def'];
  for (let i = 0; i < 3; i++) {
    const a = G.animT * 1.4 + i * 2.1;
    const bx = x + Math.sin(a) * 4 + (i - 1) * 12;
    const by = y - 26 - i * 7 + Math.cos(a * 0.8) * 3;
    ctx.strokeStyle = 'rgba(60,60,60,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.quadraticCurveTo((x + bx) / 2, (y + by) / 2 + 4, bx, by + 9); ctx.stroke();
    ctx.fillStyle = cols[i];
    ctx.beginPath(); ctx.ellipse(bx, by, 8, 10, 0, 0, 7); ctx.fill();
  }
}

function drawWorldObjects() {
  ctx.save();
  ctx.translate(-G.camX, 0);
  const finishPx = CFG.trackLen * CFG.ppm;
  const viewL = G.camX - 40, viewR = G.camX + W + 40;

  // crowd behind the fence
  const excited = G.winner != null;
  for (const s of crowd) {
    if (s.x < viewL || s.x > viewR) continue;
    const bob = excited
      ? Math.abs(Math.sin(G.animT * 8 + s.ph)) * 6
      : Math.sin(G.animT * 2.6 + s.ph) * 1.8;
    ctx.fillStyle = s.c;
    rr(s.x - 7, 358 - bob, 14, 22, 6); ctx.fill();
    ctx.fillStyle = s.skin;
    ctx.beginPath(); ctx.arc(s.x, 352 - bob, 6, 0, 7); ctx.fill();
  }

  // fence
  ctx.fillStyle = '#9a7748';
  const p0 = Math.floor(viewL / 46);
  for (let i = p0; i <= Math.ceil(viewR / 46); i++) {
    rr(i * 46 - 3, 352, 6, 28, 2); ctx.fill();
  }
  ctx.fillStyle = '#b08a58';
  ctx.fillRect(viewL, 357, viewR - viewL, 5);
  ctx.fillRect(viewL, 368, viewR - viewL, 5);

  // start line
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillRect(-4, TRACK_TOP, 4, TRACK_BOT - TRACK_TOP);
  ctx.fillRect(4, TRACK_TOP, 4, TRACK_BOT - TRACK_TOP);
  ctx.fillStyle = '#fff';
  rr(-52, 330, 64, 20, 5); ctx.fill();
  tx('START', -20, 340, 11, { c: '#3a6b2e', sw: 0 });

  // distance posts
  for (let m = 50; m < CFG.trackLen; m += 50) {
    const x = m * CFG.ppm;
    if (x < viewL || x > viewR) continue;
    ctx.fillStyle = '#e8e2d2';
    rr(x - 2, 346, 4, 36, 2); ctx.fill();
    ctx.fillStyle = '#fff';
    rr(x - 17, 330, 34, 19, 4); ctx.fill();
    tx(m + 'm', x, 340, 11, { c: '#555', sw: 0 });
  }

  // finish: checkered strip + banner
  if (finishPx > viewL - 60 && finishPx < viewR + 60) {
    const rows = Math.ceil((TRACK_BOT - TRACK_TOP - 2) / 7.8);
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < 2; col++) {
        ctx.fillStyle = (row + col) % 2 ? '#222' : '#fafafa';
        ctx.fillRect(finishPx + col * 8 - 8, TRACK_TOP + 2 + row * 7.8, 8, 7.8);
      }
    }
    ctx.fillStyle = '#8c6b40';
    rr(finishPx - 84, 296, 9, 86, 3); ctx.fill();
    rr(finishPx + 75, 296, 9, 86, 3); ctx.fill();
    ctx.fillStyle = '#e0484f';
    rr(finishPx - 88, 288, 176, 34, 8); ctx.fill();
    tx('FINISH', finishPx, 305, 19, { c: '#fff', sw: 0 });
    drawBalloons(finishPx - 80, 296);
    drawBalloons(finishPx + 80, 296);
  }

  // treats
  for (const t of G.treats) {
    const x = t.m * CFG.ppm;
    if (x < viewL || x > viewR) continue;
    for (const id of ['cpu', 'player']) {
      if (t.taken[id]) continue;
      const lane = LANES[id];
      const y = lane.ground - 14 + Math.sin(G.animT * 3 + t.bob) * 2.5;
      ctx.fillStyle = 'rgba(255,220,100,' + (0.16 + 0.09 * Math.sin(G.animT * 4 + t.bob)).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(x, y, 19, 0, 7); ctx.fill();
      ctx.fillStyle = '#fdf3da';
      ctx.strokeStyle = '#b8935c';
      ctx.lineWidth = 2;
      for (const ex of [-9, 9]) {
        for (const ey of [-4, 4]) {
          ctx.beginPath(); ctx.arc(x + ex, y + ey, 5.2, 0, 7);
          ctx.fill(); ctx.stroke();
        }
      }
      rr(x - 9, y - 4, 18, 8, 4); ctx.fill(); ctx.stroke();
      rr(x - 9, y - 3, 18, 6, 3); ctx.fill();
    }
  }

  // dogs race in their lanes (the title screen previews them elsewhere)
  if (G.state !== 'title') {
    drawDogWorld(G.cpu);
    drawDogWorld(G.player);
  }

  drawParticles();
  ctx.restore();
}

/* ===================== drawing: dachshund ===================== */

function drawDogWorld(d) {
  const sx = d.x * CFG.ppm;
  drawDog(sx, d.lane.ground, d.lane.scale, d, false);
  const a = G.state === 'racing' || G.state === 'countdown' ? 0.85 : 0;
  if (a > 0) {
    tx(d.name, sx, d.lane.ground - 114 * d.lane.scale, 13, {
      c: 'rgba(255,255,255,' + a + ')', stroke: 'rgba(40,30,20,' + a * 0.8 + ')', sw: 3
    });
  }
}

function drawDog(px, groundY, scale, d, photoMode) {
  const C = d.colors;
  const S = C.shape;             // per-breed geometry
  const half = S.bodyLen / 2;
  const idle = !photoMode && (G.state === 'title' ||
    ((G.state === 'countdown' || G.state === 'paused') && d.v < 0.4));
  const isWin = !photoMode && G.state === 'finished' && G.winner === d.id;
  const isLoser = !photoMode && G.state === 'finished' && G.winner != null && G.winner !== d.id;

  let bounce;
  if (isWin) bounce = Math.abs(Math.sin(G.animT * 7 + d.blinkSeed)) * 15;
  else if (idle) bounce = (1 + Math.sin(G.animT * 2.2 + d.blinkSeed)) * 0.9;
  else bounce = Math.abs(Math.sin(d.phase)) * (2 + Math.min(9, d.v * 0.7)) + (d.hopT > 0 ? (d.hopT / 0.12) * 4 : 0);

  ctx.save();
  ctx.translate(px, groundY);
  ctx.scale(scale, scale);

  if (d.zoomT > 0) {
    ctx.strokeStyle = 'rgba(255,150,50,' + (0.35 + 0.25 * Math.sin(G.animT * 22)).toFixed(3) + ')';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      const yy = -(S.legLen + 6) - i * 13;
      ctx.beginPath();
      ctx.moveTo(-half - 12 - i * 9, yy);
      ctx.lineTo(-half - 54 - i * 14 - Math.sin(G.animT * 18 + i) * 8, yy);
      ctx.stroke();
    }
    tx('⚡', half + 14, -(S.legLen + S.bodyR + S.headR * 2 + 34), 22, { sw: 0 });
  }

  ctx.fillStyle = 'rgba(30,20,10,0.18)';
  ctx.beginPath();
  ctx.ellipse(2, -3, (half + 8) * (1 - bounce * 0.012), 8, 0, 0, 7);
  ctx.fill();

  const bodyCy = -(S.legLen + S.bodyR) + 6 - bounce;
  const legLen = S.legLen;
  const amp = idle ? 0 : Math.min(0.85, 0.18 + d.v * 0.05);

  function leg(hx, hy, ang, color) {
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(ang);
    ctx.fillStyle = color;
    rr(-S.legW / 2, 0, S.legW, legLen, S.legW / 2);
    ctx.fill();
    ctx.fillStyle = C.paw;
    ctx.beginPath(); ctx.arc(0, legLen - 2, S.legW / 2 + 0.2, 0, 7); ctx.fill();
    ctx.restore();
  }

  const hipX = half - 13;
  const hipY = bodyCy + S.bodyR * 0.62;
  leg(-hipX, hipY, Math.sin(d.phase + Math.PI + 2.4) * amp, C.legDark || C.dark);
  leg(hipX, hipY, Math.sin(d.phase + 2.4) * amp, C.legDark || C.dark);

  ctx.fillStyle = C.main;
  rr(-half, bodyCy - S.bodyR, S.bodyLen, S.bodyR * 2, S.bodyR);
  ctx.fill();
  ctx.save();
  rr(-half, bodyCy - S.bodyR, S.bodyLen, S.bodyR * 2, S.bodyR);
  ctx.clip();
  ctx.fillStyle = C.belly;
  ctx.globalAlpha = 0.55;
  ctx.beginPath();
  ctx.ellipse(-2, bodyCy + S.bodyR * 0.7, half * 0.8, S.bodyR * 0.65, 0, 0, 7);
  ctx.fill();
  ctx.globalAlpha = 1;
  // breed coat patches (e.g. a beagle saddle), clipped to the body
  if (C.patches) {
    ctx.fillStyle = C.patchColor;
    for (const p of C.patches) {
      ctx.beginPath();
      ctx.ellipse(p.dx, bodyCy + p.dy, p.rx, p.ry, p.rot, 0, 7);
      ctx.fill();
    }
  }
  ctx.restore();

  const wag = idle || isWin ? 0.55 + Math.sin(G.animT * (isWin ? 14 : 6) + d.blinkSeed * 3) * 0.5
    : 0.5 + Math.sin(G.animT * (5 + Math.min(8, d.v)) + d.blinkSeed * 3) * 0.3;
  const tex = -half - Math.cos(wag) * S.tailL;
  const tey = bodyCy - 8 - Math.sin(wag) * S.tailL;
  ctx.strokeStyle = C.tail || C.dark;
  ctx.lineWidth = S.tailW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-half + 2, bodyCy - 6);
  ctx.quadraticCurveTo(-half - 12, bodyCy - 10, tex, tey);
  ctx.stroke();
  if (C.tailTip) {
    ctx.fillStyle = C.tailTip;
    ctx.beginPath(); ctx.arc(tex, tey, S.tailW / 2 + 1.2, 0, 7); ctx.fill();
  }

  leg(-hipX, hipY, Math.sin(d.phase + Math.PI) * amp, C.leg || C.main);
  leg(hipX, hipY, Math.sin(d.phase) * amp, C.leg || C.main);

  ctx.fillStyle = C.collar;
  rr(half - 12, bodyCy - S.bodyR - 1, 9, S.bodyR * 1.2, 4);
  ctx.fill();
  ctx.fillStyle = '#f3c34a';
  ctx.beginPath(); ctx.arc(half - 7, bodyCy + S.bodyR * 0.35, 3.5, 0, 7); ctx.fill();

  const headDrop = isLoser ? 7 : 0;
  const hb = idle ? Math.sin(G.animT * 2.2 + d.blinkSeed) * 1 : Math.sin(d.phase + 0.9) * 1.6;
  const hx = half + 10, hy = bodyCy - S.headUp + hb + headDrop;

  let earA;
  if (idle) {
    earA = 0.12 + (((G.animT + d.blinkSeed) % 5) < 0.18 ? 0.55 : 0);
  } else if (isLoser) {
    earA = 0.04;
  } else {
    earA = 0.3 + Math.min(0.8, d.v * 0.055) + Math.sin(d.phase + 1.2) * 0.12 * (0.3 + Math.min(1, d.v * 0.1)) + (d.zoomT > 0 ? 0.45 : 0) + (isWin ? Math.abs(Math.sin(G.animT * 12)) * 0.6 : 0);
  }

  // neck connecting body to a raised head
  ctx.fillStyle = C.head || C.main;
  ctx.beginPath();
  ctx.moveTo(half - 16, bodyCy - S.bodyR + 2);
  ctx.lineTo(hx - 4, hy);
  ctx.lineTo(hx + 6, hy + S.headR);
  ctx.lineTo(half - 2, bodyCy + 4);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath(); ctx.arc(hx, hy, S.headR, 0, 7); ctx.fill();

  ctx.fillStyle = C.snout;
  rr(hx + S.headR * 0.3, hy - S.snoutH / 2 + 2, S.snoutL, S.snoutH, S.snoutH / 2);
  ctx.fill();
  ctx.fillStyle = C.nose || '#2a1d12';
  ctx.beginPath(); ctx.arc(hx + S.headR * 0.3 + S.snoutL - 1, hy + 2 - S.snoutH * 0.1, 4.2, 0, 7); ctx.fill();

  const pant = d.zoomT > 0 || d.stamina < 30 || d.v > 10.8 || isLoser || isWin;
  if (pant && !idle) {
    ctx.fillStyle = '#ef8aa0';
    const tw = Math.sin(G.animT * 14 + d.blinkSeed) * 2;
    rr(hx + S.headR * 0.3 + S.snoutL * 0.5, hy + S.snoutH / 2 + 2, 7, 13 + tw, 3.5);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(hx - S.headR * 0.35, hy - S.headR * 0.7);
  ctx.rotate(earA);
  ctx.fillStyle = C.ear;
  ctx.beginPath();
  ctx.ellipse(0, S.earH * 0.8, S.earW, S.earH, 0, 0, 7);
  ctx.fill();
  ctx.restore();

  const blink = !photoMode && ((G.animT + d.blinkSeed) % 3.7) < 0.1;
  if (blink) {
    ctx.strokeStyle = '#241a10';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(hx + 1, hy - S.headR * 0.4);
    ctx.lineTo(hx + 8, hy - S.headR * 0.4);
    ctx.stroke();
  } else {
    ctx.fillStyle = C.eyeWhite || '#fff';
    ctx.beginPath(); ctx.arc(hx + 5, hy - S.headR * 0.4, 4.5, 0, 7); ctx.fill();
    ctx.fillStyle = '#241a10';
    ctx.beginPath(); ctx.arc(hx + 6.5, hy - S.headR * 0.4, 2.4, 0, 7); ctx.fill();
  }
  if (C.brow) {
    ctx.fillStyle = C.brow;
    ctx.beginPath(); ctx.arc(hx + 3, hy - S.headR * 0.82, 2.6, 0, 7); ctx.fill();
  }

  ctx.restore();
}

function drawMiniHead(x, y, C) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = C.head || C.main;
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, 7); ctx.fill();
  ctx.fillStyle = C.snout;
  rr(4, -3, 16, 8, 4); ctx.fill();
  ctx.fillStyle = C.nose || '#2a1d12';
  ctx.beginPath(); ctx.arc(19, -1, 2.4, 0, 7); ctx.fill();
  ctx.fillStyle = C.ear;
  ctx.beginPath(); ctx.ellipse(-5, 6, 5, 11, 0.3, 0, 7); ctx.fill();
  ctx.fillStyle = C.eyeWhite || '#fff';
  ctx.beginPath(); ctx.arc(3, -4, 2.6, 0, 7); ctx.fill();
  ctx.fillStyle = '#241a10';
  ctx.beginPath(); ctx.arc(3.8, -4, 1.4, 0, 7); ctx.fill();
  ctx.restore();
}

/* ===================== drawing: UI ===================== */

function button(id, x, y, w, h, label, o) {
  o = o || {};
  const hp = o.pad || 0;
  G.ui.push({ id, x: x - hp, y: y - hp, w: w + 2 * hp, h: h + 2 * hp });
  const hot = G.pointer && G.pointer.x >= x && G.pointer.x <= x + w && G.pointer.y >= y && G.pointer.y <= y + h;
  const lift = hot ? 2 : 0;
  ctx.save();
  if (!o.flat) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    rr(x, y + 3, w, h, o.r || 14);
    ctx.fill();
  }
  ctx.fillStyle = hot ? (o.hotBg || o.bg || '#56a843') : (o.bg || '#4a9639');
  rr(x, y - lift, w, h, o.r || 14);
  ctx.fill();
  if (o.border) {
    ctx.strokeStyle = o.border;
    ctx.lineWidth = 2.5;
    rr(x, y - lift, w, h, o.r || 14);
    ctx.stroke();
  }
  tx(label, x + w / 2, y + h / 2 - lift + 1, o.size || 19, { c: o.fg || '#fff', sw: 0 });
  ctx.restore();
}

function barHUD(x, y, w, h, frac, fillStyle, label, pulse) {
  ctx.fillStyle = 'rgba(20,16,10,0.4)';
  rr(x - 2, y - 2, w + 4, h + 4, (h + 4) / 2);
  ctx.fill();
  if (frac > 0.005) {
    ctx.fillStyle = fillStyle;
    if (pulse) ctx.globalAlpha = 0.75 + 0.25 * Math.sin(G.animT * 10);
    rr(x, y, Math.max(h, w * clamp(frac, 0, 1)), h, h / 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  tx(label, x + 2, y - 11, 11, { align: 'left', c: 'rgba(255,255,255,0.95)', stroke: 'rgba(0,0,0,0.5)', sw: 2.5 });
}

function drawHUD() {
  const p = G.player, c = G.cpu;
  const st = safeTop;

  // progress bar
  const bx = 76, bw = 380, by = st + 18, bh = 13;
  ctx.fillStyle = 'rgba(20,16,10,0.4)';
  rr(bx - 3, by - 3, bw + 6, bh + 6, 9);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  rr(bx, by, bw, bh, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx + bw + 8, by - 4, 2, 21);
  for (let i = 0; i < 2; i++) for (let j = 0; j < 2; j++) {
    ctx.fillStyle = (i + j) % 2 ? '#222' : '#eee';
    ctx.fillRect(bx + bw + 10 + i * 5, by - 4 + j * 5, 5, 5);
  }
  const dotX = d => bx + bw * clamp(d.x / CFG.trackLen, 0, 1);
  ctx.fillStyle = c.colors.main;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(dotX(c), by + 2, 6.5, 0, 7); ctx.fill(); ctx.stroke();
  ctx.fillStyle = p.colors.main;
  ctx.beginPath(); ctx.arc(dotX(p), by + 10, 7.5, 0, 7); ctx.fill(); ctx.stroke();

  tx(G.raceT.toFixed(1) + 's', 270, st + 56, 16, { c: 'rgba(255,255,255,0.9)', stroke: 'rgba(0,0,0,0.45)', sw: 3 });

  // stamina / zoomies bars
  const sFrac = p.stamina / 100;
  const sCol = sFrac > 0.55 ? '#5ecb50' : sFrac > 0.28 ? '#e8c33c' : '#e25540';
  barHUD(16, st + 86, 225, 16, sFrac, sCol, 'STAMINA', sFrac < 0.18);

  const zFull = p.zoom >= 100 && p.zoomT <= 0;
  const zFrac = p.zoomT > 0 ? p.zoomT / CFG.zoomDur : p.zoom / 100;
  const zCol = p.zoomT > 0 ? '#ff8a2a' : zFull ? '#ffb02a' : '#b06ee8';
  barHUD(300, st + 86, 225, 16, zFrac, zCol, p.zoomT > 0 ? 'ZOOMIES!!!' : 'ZOOMIES ⚡', zFull || p.zoomT > 0);

  // mute / pause
  button('mute', 12, st + 10, 44, 44, G.muted ? '🔇' : '🔊', { bg: 'rgba(20,16,10,0.45)', hotBg: 'rgba(20,16,10,0.7)', r: 12, size: 19, pad: 8 });
  button('pause', 484, st + 10, 44, 44, '⏸', { bg: 'rgba(20,16,10,0.45)', hotBg: 'rgba(20,16,10,0.7)', r: 12, size: 19, pad: 8 });

  // off-screen rival indicator
  const csx = c.x * CFG.ppm - G.camX;
  const gapM = Math.round(Math.abs(c.x - p.x));
  if (csx > W + 30) {
    ctx.fillStyle = 'rgba(20,16,10,0.55)';
    rr(W - 142, c.lane.ground - 86, 130, 28, 14); ctx.fill();
    tx(c.name + ' ▶ ' + gapM + 'm', W - 77, c.lane.ground - 72, 12, { sw: 0 });
  } else if (csx < -30) {
    ctx.fillStyle = 'rgba(20,16,10,0.55)';
    rr(12, c.lane.ground - 86, 130, 28, 14); ctx.fill();
    tx('◀ ' + c.name + ' ' + gapM + 'm', 77, c.lane.ground - 72, 12, { sw: 0 });
  }
}

/* big thumb controls at the bottom */
function drawControls() {
  const p = G.player;
  const ct = H - safeBottom - 236;

  // zoomies pill
  const zFull = p.zoom >= 100 && p.zoomT <= 0;
  if (zFull || p.zoomT > 0) {
    const pulse = zFull ? 1 + 0.04 * Math.sin(G.animT * 9) : 1;
    ctx.save();
    ctx.translate(270, ct + 30);
    ctx.scale(pulse, pulse);
    ctx.translate(-270, -(ct + 30));
    button('zoom', 160, ct, 220, 60, zFull ? '⚡ ZOOMIES!' : 'ZOOM!!!', {
      bg: zFull ? '#ff9d2e' : '#c97818', hotBg: '#ffb02a', r: 30, size: 22
    });
    if (p.zoomT > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      rr(170, ct + 48, 200 * (p.zoomT / CFG.zoomDur), 5, 2.5);
      ctx.fill();
    }
    ctx.restore();
  }

  // one wide drumming pad
  const racing = G.state === 'racing';
  const x = 18, y = ct + 74, w = 504, h = 148;
  G.ui.push({ id: 'paw', x, y, w, h });
  const flash = G.pawFlash.t > 0;
  const hint = racing && G.raceT < 8 && !flash;
  ctx.save();
  if (flash) {
    const pop = 1 + 0.035 * (G.pawFlash.t / 0.1);
    ctx.translate(x + w / 2, y + h / 2);
    ctx.scale(pop, pop);
    ctx.translate(-(x + w / 2), -(y + h / 2));
  }
  ctx.fillStyle = flash ? 'rgba(135,220,98,0.95)'
    : hint ? 'rgba(70,90,60,' + (0.62 + 0.18 * Math.sin(G.animT * 7)).toFixed(2) + ')'
    : 'rgba(30,38,26,0.6)';
  rr(x, y, w, h, 26);
  ctx.fill();
  ctx.strokeStyle = flash ? '#eaffdf' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = flash ? 4 : 2.5;
  rr(x, y, w, h, 26);
  ctx.stroke();
  tx('🐾', x + w / 2 - 92, y + h / 2 - 2, 46, { sw: 0 });
  tx('🐾', x + w / 2 + 92, y + h / 2 - 2, 46, { sw: 0 });
  tx('TAP', x + w / 2, y + h / 2 + 2, 32, { c: 'rgba(255,255,255,0.9)', sw: 0 });
  ctx.restore();
  if (hint) {
    tx('TAP!', x + w / 2, y - 16, 17, { c: '#ffd34e', stroke: 'rgba(0,0,0,0.55)', sw: 3 });
  }
  if (racing && G.raceT < 6) {
    const a = clamp(6 - G.raceT, 0, 1) * 0.9;
    tx('drum with both thumbs — every tap counts!', 270, ct + 244, 15, { c: 'rgba(255,255,255,' + a.toFixed(2) + ')', stroke: 'rgba(0,0,0,' + (a * 0.5).toFixed(2) + ')', sw: 3 });
  }
}

function drawCountdown() {
  drawHUD();

  ctx.fillRect(0, 0, W, H);
  const c = Math.ceil(G.countT);

    ctx.save();
    ctx.translate(270, 470);
    ctx.scale(scale, scale);
    tx(String(c), 0, 0, 150, {
      c: 'rgba(255,255,255,' + alpha.toFixed(2) + ')',

    });

function drawGoFlash(fdt) {
  if (G.goFlash <= 0) return;
  if (G.state === 'racing') G.goFlash = Math.max(0, G.goFlash - fdt);
  const f = G.goFlash / 0.9;
  const scale = 1 + (1 - f) * 0.8;
  ctx.save();
  ctx.translate(270, 470);
  ctx.scale(scale, scale);
  tx('GO!!', 0, 0, 120, {
    c: 'rgba(255,211,78,' + f.toFixed(2) + ')',
    stroke: 'rgba(60,35,10,' + (f * 0.9).toFixed(2) + ')', sw: 13
  });
  ctx.restore();
}

function drawPhotoStrip(cx, cy) {
  const w = 340, h = 100;
  const x = cx - w / 2, y = cy - h / 2;
  ctx.save();
  ctx.fillStyle = '#cf9059';
  rr(x, y, w, h, 8);
  ctx.fill();
  ctx.strokeStyle = '#7a5a38';
  ctx.lineWidth = 3;
  rr(x, y, w, h, 8);
  ctx.stroke();
  rr(x, y, w, h, 8);
  ctx.clip();
  const lineX = x + w * 0.68;
  for (let row = 0; row < 13; row++) {
    for (let col = 0; col < 2; col++) {
      ctx.fillStyle = (row + col) % 2 ? '#222' : '#fafafa';
      ctx.fillRect(lineX + col * 5, y + row * 8, 5, 8);
    }
  }
  const winD = G.winner === 'player' ? G.player : G.cpu;
  const loseD = G.winner === 'player' ? G.cpu : G.player;
  const loserV = Math.max(3, loseD.finishV || 8);
  const dxPx = clamp((G.margin || 0) * loserV * CFG.ppm * 0.5, 5, 90);
  const noseOffset = 48;
  const winCx = lineX - noseOffset + 4;
  const winY = winD.id === 'cpu' ? y + 40 : y + 90;
  const loseY = loseD.id === 'cpu' ? y + 40 : y + 90;
  const phW = { ...winD, zoomT: 0, v: Math.max(2, winD.finishV), phase: winD.finishPhase || 2, hopT: 0 };
  const phL = { ...loseD, zoomT: 0, v: Math.max(2, loseD.finishV), phase: loseD.finishPhase || 4, hopT: 0 };
  drawDog(winCx, winY, 0.5, phW, true);
  drawDog(winCx - dxPx, loseY, 0.5, phL, true);
  ctx.restore();
  ctx.save();
  ctx.translate(cx - w / 2 + 60, cy - h / 2 + 16);
  ctx.rotate(-0.1);
  tx('PHOTO FINISH!', 0, 0, 16, { c: '#e0484f', stroke: '#fff', sw: 4 });
  ctx.restore();
}

function drawResults() {
  const a = clamp(G.resultsT / 0.4, 0, 1);
  ctx.fillStyle = 'rgba(12,16,10,' + (0.45 * a).toFixed(2) + ')';
  ctx.fillRect(0, 0, W, H);
  if (a < 0.05) return;

  const won = G.winner === 'player';
  const panH = G.photo ? 432 : 340;
  const panY = Math.max(safeTop + 110, Math.round((H - panH) / 2) - 40) + (1 - a) * 26;
  ctx.save();
  ctx.globalAlpha = a;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  rr(28, panY + 6, 484, panH, 24);
  ctx.fill();
  ctx.fillStyle = '#fdf7e8';
  rr(28, panY, 484, panH, 24);
  ctx.fill();

  ctx.fillStyle = won ? '#4a9639' : '#5c6672';
  rr(48, panY - 20, 444, 60, 18);
  ctx.fill();
  tx(won ? '🏆 ' + G.player.name + ' WINS!' : '🥈 ' + G.cpu.name + ' WINS THIS ONE…', 270, panY + 11, won ? 28 : 24, { c: '#fff', sw: 0 });

  let yy = panY + 66;
  const sub = G.photo ? 'PHOTO FINISH — decided by ' + G.margin.toFixed(2) + 's!'
    : G.margin != null ? (won ? 'Won' : 'Lost') + ' by ' + G.margin.toFixed(2) + 's'
    : won ? cap(G.cpu.name) + ' never even made it home…' : cap(G.player.name) + ' needs a pep talk (and a snack).';
  tx(sub, 270, yy, 16, { c: '#7a6a4a', sw: 0 });
  yy += 40;

  const rows = [[G.player, won], [G.cpu, !won]].sort((r1, r2) => (r2[1] ? 1 : 0) - (r1[1] ? 1 : 0));
  for (const [d, isW] of rows) {
    drawMiniHead(94, yy, d.colors);
    tx((isW ? '1st  ' : '2nd  ') + d.name, 122, yy, 20, { align: 'left', c: '#41372a', sw: 0 });
    tx(fmtT(d.finishTime), 452, yy, 20, { align: 'right', c: isW ? '#33802b' : '#8a7a5d', sw: 0 });
    yy += 42;
  }
  const best = G.best[G.diff];
  tx('Your best (' + DIFFS[G.diff].label.toLowerCase() + '): ' + fmtT(best), 230, yy + 2, 14, { c: '#9a8a68', sw: 0 });
  if (G.newRecord) {
    const ps = 1 + 0.08 * Math.sin(G.animT * 9);
    ctx.save();
    ctx.translate(430, yy + 2);
    ctx.rotate(0.12);
    ctx.scale(ps, ps);
    tx('NEW RECORD! ⭐', 0, 0, 15, { c: '#e8762e', stroke: '#fff', sw: 4 });
    ctx.restore();
  }
  yy += 26;

  if (G.photo) {
    drawPhotoStrip(270, yy + 56);
  } else if (!won && G.margin != null && G.margin < 2.5) {
    tx('Tip: grab 🦴 and save ZOOMIES for the final stretch!', 270, yy + 48, 14, { c: '#9a8a68', sw: 0 });
  }

  const btnY = panY + panH - 80;
  button('rematch', 52, btnY, 240, 62, '🔁 REMATCH', { size: 20 });
  button('menu', 312, btnY, 176, 62, 'MENU', { bg: '#8a8273', hotBg: '#9a9283', size: 19 });
  ctx.restore();
}

function drawPause() {
  ctx.fillStyle = 'rgba(10,14,8,0.55)';
  ctx.fillRect(0, 0, W, H);
  tx('PAUSED', 270, 380, 58, { c: '#fff', stroke: 'rgba(40,25,10,0.8)', sw: 9 });
  button('resume', 120, 450, 300, 72, '▶ RESUME', { size: 22 });
  button('menu', 160, 545, 220, 58, 'MENU', { bg: '#8a8273', hotBg: '#9a9283', size: 18 });
}

/* ===================== render ===================== */

function render(fdt) {
  G.animT += fdt;
  G.ui.length = 0;
  if (G.pawFlash.t > 0) G.pawFlash.t = Math.max(0, G.pawFlash.t - fdt);

  if (Math.min(2.5, window.devicePixelRatio || 1) !== lastDpr) resize();

  if (G.state !== 'title') {
    const t = camTargetX();
    G.camX += (t - G.camX) * (1 - Math.exp(-8 * fdt));
    if (Math.abs(t - G.camX) < 0.3) G.camX = t;
  }

  if (G.state !== 'paused') {
    updateParticles(fdt);
    updateConfetti(fdt);
  }

  ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawForest();
  drawGrassAndTrack();
  drawWorldObjects();

  switch (G.state) {
    case 'title':
      drawTitle();
      break;
    case 'countdown':
      drawCountdown();
      break;
    case 'racing':
      drawHUD();
      drawControls();
      drawGoFlash(fdt);
      break;
    case 'paused':
      drawHUD();
      drawControls();
      drawPause();
      break;
    case 'finished':
      G.resultsT += fdt;
      drawConfetti();
      drawResults();
      break;
  }
}

/* ===================== input ===================== */

const keysHeld = new Set();
const KEYS_L = ['ArrowLeft', 'KeyA'];
const KEYS_R = ['ArrowRight', 'KeyD'];
const GAME_KEYS = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space', 'KeyA', 'KeyD', 'Enter', 'KeyP', 'KeyM', 'Escape'];

function cycleDiff(dir) {
  const i = DIFF_ORDER.indexOf(G.diff);
  G.diff = DIFF_ORDER[(i + dir + 3) % 3];
  saveData();
}
function cycleChar(dir) {
  G.charSel = (G.charSel + dir + ROSTER.length) % ROSTER.length;
  applyPlayerChar();
  saveData();
}

function handleKey(code) {
  if (code === 'KeyM') { toggleMute(); return; }
  switch (G.state) {
    case 'title':
      if (code === 'ArrowLeft') cycleDiff(-1);
      else if (code === 'ArrowRight') cycleDiff(1);
      else if (code === 'ArrowUp') cycleChar(-1);
      else if (code === 'ArrowDown') cycleChar(1);
      else if (code === 'Space' || code === 'Enter') startRace();
      break;
    case 'countdown':
      if (KEYS_L.includes(code) || KEYS_R.includes(code)) playerTap();
      else if (code === 'KeyP' || code === 'Escape') setPause(true);
      break;
    case 'racing':
      if (KEYS_L.includes(code) || KEYS_R.includes(code)) playerTap();
      else if (code === 'Space') dogZoomies(G.player);
      else if (code === 'KeyP' || code === 'Escape') setPause(true);
      break;
    case 'paused':
      if (code === 'KeyP' || code === 'Escape' || code === 'Space' || code === 'Enter') setPause(false);
      break;
    case 'finished':
      if (G.resultsT > 0.6) {
        if (code === 'Space' || code === 'Enter') startRace();
        else if (code === 'Escape') toTitle();
      }
      break;
  }
}

window.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const code = e.code;
  if (GAME_KEYS.includes(code)) e.preventDefault();
  if (keysHeld.has(code)) return;
  keysHeld.add(code);
  firstGesture();
  handleKey(code);
});
window.addEventListener('keyup', e => keysHeld.delete(e.code));
window.addEventListener('blur', () => keysHeld.clear());

function toLogical(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width * W,
    y: (e.clientY - r.top) / r.height * H
  };
}

function uiAction(id) {
  if (id === 'mute') { toggleMute(); return; }
  if (id === 'pause') { setPause(true); return; }
  if (id === 'resume') { setPause(false); return; }
  if (id === 'menu') { if (G.state !== 'finished' || G.resultsT > 0.3) toTitle(); return; }
  if (id === 'start') { startRace(); return; }
  if (id === 'rematch') { if (G.resultsT > 0.3) startRace(); return; }
  if (id === 'paw') { playerTap(); return; }
  if (id === 'zoom') { if (!dogZoomies(G.player)) playerTap(); return; }
  if (id.indexOf('diff-') === 0) {
    const k = id.slice(5);
    if (DIFF_ORDER.includes(k)) { G.diff = k; saveData(); }
    return;
  }
  if (id.indexOf('char-') === 0) {
    const i = parseInt(id.slice(5), 10);
    if (i >= 0 && i < ROSTER.length) { G.charSel = i; applyPlayerChar(); saveData(); }
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  firstGesture();
  const p = toLogical(e);
  G.pointer = p;
  for (const b of G.ui) {
    if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
      uiAction(b.id);
      return;
    }
  }
  // generous fallback: anywhere below the HUD counts as a stride tap
  if ((G.state === 'racing' || G.state === 'countdown') && p.y > safeTop + 120) {
    playerTap();
  }
});
canvas.addEventListener('pointermove', e => { G.pointer = toLogical(e); });
canvas.addEventListener('pointerleave', () => { G.pointer = null; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());   // iOS pinch

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    keysHeld.clear();
    if (G.state === 'racing' || G.state === 'countdown') setPause(true);
  }
  updateMusic();
});

/* ===================== main loop ===================== */

let lastFrame = performance.now();
let acc = 0;

function frame(now) {
  requestAnimationFrame(frame);
  let fdt = (now - lastFrame) / 1000;
  lastFrame = now;
  if (fdt > 0.1) fdt = 0.1;
  if (fdt < 0) fdt = 0;

  if (G.state === 'racing' || G.state === 'countdown' || G.state === 'finished') {
    acc += fdt;
    let n = 0;
    while (acc >= CFG.dt && n++ < 30) {
      update(CFG.dt);
      G.stepN++;
      acc -= CFG.dt;
    }
  } else {
    acc = 0;
  }

  render(fdt);
}
requestAnimationFrame(frame);

/* debug / automation hooks */
window.DD = {
  G, CFG, DIFFS, ROSTER, Snd,
  startRace, toTitle, setPause, enterFinished,
  step: dt => update(dt),
  tap: side => dogStride(G.player, side),
  zoom: () => dogZoomies(G.player)
};
</script>
</body>
</html>
